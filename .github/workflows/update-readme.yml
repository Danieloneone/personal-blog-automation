name: Update README

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update README
        run: |
          echo "Updating README with recent repository activity..."
          # Aquí iría tu script para actualizar el README
      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.md
          git commit -m "PBA-1: Update README automatically #close" || echo "No changes to commit"
          git push
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}

